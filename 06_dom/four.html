<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code | DOM</title>
</head>
<body style="background-color: black;color:aliceblue">
    <ul class="language">
        <li>Javascript</li>
    </ul>
    
</body>
<script>
    function addLanguage(langName){
        const li=document.createElement("li");
        li.innerHTML=`${langName}`
        document.querySelector(".language").appendChild(li);
    }
  addLanguage("java");
  addLanguage("CPP");


    function addOptiLanguage(langName){
      const li= document.createElement("li");
     const text= document.createTextNode(langName);
     li.appendChild(text);
     document.querySelector(".language").appendChild(li);
}
    addOptiLanguage("Python");
    addOptiLanguage("Typescript");
    // lets edit the element
    // replace second lang with mojo
  const seconlang= document.querySelector("li:nth-child(2)")
  console.log(seconlang);
  // secondlang.innerHTML="Mojo"
  const newli=document.createElement("li");
  newli.appendChild(document.createTextNode("Mojo"))
  seconlang.replaceWith(newli);
  // replace first langwith typescript
  const firstlang=document.querySelector("li:nth-child(1)");
  console.log(firstlang);
  firstlang.outerHTML="<li>Type</li>"
  //remove golang
 const lastlang=document.querySelector("li:last-child");
lastlang.remove;

</script>
</html>
